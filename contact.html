<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact – Netviz Solutions</title>

<link rel="stylesheet" href="css/header.css" />
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/contact.css" />

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans&family=Space+Mono&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER (COPY SAME FROM SERVICES) -->
<header class="site-header" id="siteHeader">
  <!-- paste same header -->
</header>

<!-- ============================================================
   HERO (CINEMATIC)
============================================================ -->
<section class="contact-hero">

<div class="particle-field" id="particleField"></div>

<div class="hero-ring hr1"></div>
<div class="hero-ring hr2"></div>

<div class="contact-hero-content">
  <h1>Contact <span>Netviz</span></h1>
  <p>Get fast CCTV & networking solutions anywhere in India</p>

  <div class="hero-buttons">
    <a href="tel:7892225484" class="btn-primary">Call Now</a>
    <a href="https://wa.me/917892225484" target="_blank" class="btn-outline-light">WhatsApp</a>
  </div>
</div>

</section>


<!-- ============================================================
   CONTACT GRID (ADVANCED)
============================================================ -->
<section class="contact-main">
<div class="container contact-grid">

<!-- FORM -->
<div class="contact-form glass">
  <h2>Send a Message</h2>

  <form>
    <div class="form-group">
      <input type="text" required>
      <label>Name</label>
    </div>

    <div class="form-group">
      <input type="email" required>
      <label>Email</label>
    </div>

    <div class="form-group">
      <input type="tel" required>
      <label>Phone</label>
    </div>

    <div class="form-group">
      <textarea required></textarea>
      <label>Requirement</label>
    </div>

    <button class="btn-submit">Send Inquiry</button>
  </form>
</div>

<!-- INFO -->
<div class="contact-info glass">
  <h2>Contact Info</h2>

  <div class="info-box">
    📞 <a href="tel:7892225484">7892225484</a>
  </div>

  <div class="info-box">
    ✉️ <a href="mailto:netvizsolutions@gmail.com">Email Us</a>
  </div>

  <div class="info-box">
    📍 All Over India
  </div>

  <div class="info-highlight">
    <h3>Why Choose Us</h3>
    <ul>
      <li>Fast Installation</li>
      <li>24×7 Support</li>
      <li>Affordable</li>
    </ul>
  </div>
</div>

</div>
</section>

<!-- FOOTER (COPY SAME FROM SERVICES) -->
<footer class="site-footer">
  <!-- paste same footer -->
</footer>


<script>
/* header */
const hdr = document.getElementById('siteHeader');
window.addEventListener('scroll', () => hdr.classList.toggle('scrolled', scrollY > 20));

/* particles */
const field = document.getElementById('particleField');
for(let i=0;i<40;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.top=Math.random()*100+'%';
  field.appendChild(p);
}
</script>

</body>
</html>
